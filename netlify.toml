# psiu_portfolio Netlify config
#
# Build pipeline:
#   1. Build root site  → dist/
#   2. Build /a         → dist/a/
#   3. Build /c (SPA)   → dist/c/
#   /b is a static HTML file copied into dist/b/

[build]
  command = """
    npm install && npm run build && \
    cd a && npm install && npm run build && cd .. && \
    cd c && npm install && npm run build && cd .. && \
    mkdir -p dist/a dist/b dist/c && \
    cp -r a/dist/* dist/a/ && \
    cp b/index.html dist/b/ && \
    cp -r c/dist/* dist/c/
  """
  publish = "dist"

# SPA fallback for /c — serves the compiled shell for every /c route so
# TanStack Router can handle client-side navigation.
[[redirects]]
  from   = "/c"
  to     = "/c/index.html"
  status = 200

[[redirects]]
  from   = "/c/*"
  to     = "/c/index.html"
  status = 200
