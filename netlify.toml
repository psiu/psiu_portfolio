
# psiu_portfolio — Netlify deploy config
# The root package.json build script already handles:
#   1. Root Vite app
#   2. /a build + copy to dist/a/
#   3. /b copy to dist/b/
#   4. /c build + copy dist/client/* to dist/c/
# So we just run that single script here.
[build]
  command = "npm install && npm run build"
  publish = "dist"
 
# /c is a React SPA. Any deep-linked route (e.g. /c/about) has no
# physical file — serve the shell index.html and let TanStack Router
# handle it client-side.
[[redirects]]
  from   = "/c/*"
  to     = "/c/index.html"
  status = 200
 